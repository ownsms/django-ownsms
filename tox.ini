[tox]
# Python 3.11+ x Django 4.2/5.0/5.1/5.2. Django 4.2 & 5.0 don't support Python 3.13.
envlist =
    py311-dj{42,50,51,52}
    py312-dj{42,50,51,52}
    py313-dj{51,52}
    lint
isolated_build = true

[testenv]
deps =
    pytest>=8
    pytest-django>=4.8
    phonenumbers>=8.13
    dj42: Django>=4.2,<4.3
    dj50: Django>=5.0,<5.1
    dj51: Django>=5.1,<5.2
    dj52: Django>=5.2,<5.3
commands = pytest -q

[testenv:lint]
skip_install = true
deps = ruff
commands = ruff check src tests

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313
